<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Nosso Amor de Música</title>
    <style>
        body {
            margin: 0;
            /* Fundo branco com padrão de corações vermelhos (#FF0000) */
            background-color: #ffffff;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60"><path d="M12 5c-1.8 0-3.5.7-4.7 2-2.6 2.6-2.6 6.8 0 9.4L24 33.1l16.7-16.7c2.6-2.6 2.6-6.8 0-9.4-2.6-2.6-6.8-2.6-9.4 0L24 14.3 16.7 7c-1.2-1.3-2.9-2-4.7-2z" fill="%23FF0000" opacity="0.15"/></svg>');
            background-size: 70px 70px; /* Tamanho dos corações */
            
            color: #333; /* Texto escuro para contrastar com o fundo branco */
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        
        .slide-container {
            width: 90%;
            max-width: 500px;
            height: 65vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-color: #fff; /* Fundo branco interno para emoldurar as fotos */
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); /* Sombra suave nas fotos */
        }
        
        .slide {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Faz as fotos preencherem o espaço sem distorcer */
            display: none;
            border-radius: 10px;
        }
        
        .active {
            display: block;
            animation: fade 1s ease-in-out;
        }
        
        @keyframes fade {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }
        
        #btn-play {
            padding: 15px 40px;
            font-size: 18px;
            border: none;
            background-color: #000;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3); /* Sombra vermelha no botão */
            transition: transform 0.2s, background-color 0.2s;
        }
        
        #btn-play:hover {
            transform: scale(1.05);
            background-color: #FF0000; /* Botão fica vermelho ao passar o mouse */
        }
    </style>
</head>
<body> 

    <div id="player-setup"> 
        <button id="btn-play">Abrir Nosso Presente</button> 
    </div> 

    <div class="slide-container" id="slideshow" style="display: none;"> 
        <img class="slide active" src="./fotos/foto1.jpg" alt="Foto 1"> 
        <img class="slide" src="./fotos/foto2.jpg" alt="Foto 2"> 
        <img class="slide" src="./fotos/foto3.jpg" alt="Foto 3"> 
        <img class="slide" src="./fotos/foto4.jpg" alt="Foto 4"> 
        <img class="slide" src="./fotos/foto5.jpg" alt="Foto 5">
    </div> 

   <audio id="musica-casal" src="audio/audio_sexy.ogg" loop></audio>

    <script> 
        const btnPlay = document.getElementById('btn-play'); 
        const playerSetup = document.getElementById('player-setup'); 
        const slideshow = document.getElementById('slideshow'); 
        const musica = document.getElementById('musica-casal'); 
        
        let slideIndex = 0; 
        const slides = document.querySelectorAll('.slide'); 
        let slideInterval; 

        btnPlay.addEventListener('click', () => { 
            playerSetup.style.display = 'none'; 
            slideshow.style.display = 'flex'; 
            
            // Inicia o áudio tratando a permissão do navegador
            musica.play().catch(error => console.log("Erro ao reproduzir áudio:", error)); 
            
            // Inicia o carrossel de fotos
            startSlideshow(); 
        }); 

        function startSlideshow() {
            slideInterval = setInterval(nextSlide, 4000);
        }

        function nextSlide() {
            slides[slideIndex].classList.remove('active');
            slideIndex = (slideIndex + 1) % slides.length;
            slides[slideIndex].classList.add('active');
        }
    </script> 
</body> 
</html>
